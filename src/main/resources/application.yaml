spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: FindMyNextFieldAPI

  datasource:
    url: jdbc:postgresql://localhost:5434/findmynextfield
    username: admin
    password: example
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations:
      - classpath:db/migration
  logging:
    level:
      org.flywaydb: TRACE
      org.springframework.boot.autoconfigure.flyway: TRACE

security:
  jwt:
    secret: ${JWT_SECRET:ezezoijfoezijoigfezojigjoezigojizeoijgzeojigojizeg}
    expiration-in-seconds: ${JWT_EXPIRATION_IN_SECONDS:86400}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
